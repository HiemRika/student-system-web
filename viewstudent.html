<!DOCTYPE html>
<html>
<head>
    <title>Kadassor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 5px;
            color: white;
        }

        .edit {
            background-color: #2196F3;
        }

        .delete {
            background-color: #f44336;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>View Student Information</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Gender</th>
            <th>Class</th>
            <th>Email</th>
            <th>Action</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Sok Dara</td>
            <td>Male</td>
            <td>IT Year 1</td>
            <td>dara@gmail.com</td>
            <td>
                <a href="#" class="btn edit">Edit</a>
                <a href="#" class="btn delete">Delete</a>
            </td>
        </tr>

        <tr>
            <td>2</td>
            <td>Rika</td>
            <td>Female</td>
            <td>IT Year 1</td>
            <td>rika@gmail.com</td>
            <td>
                <a href="#" class="btn edit">Edit</a>
                <a href="#" class="btn delete">Delete</a>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
