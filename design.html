<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lambo Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #111111);
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.7);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #c6ff00;
    }

    .menu a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #c6ff00;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .hero span {
      color: #c6ff00;
    }

    .hero p {
      color: #aaa;
      font-size: 18px;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 30px;
      border: none;
      background: #c6ff00;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #aee000;
    }

    /* CAR CARD */
    .section {
      padding: 50px;
      text-align: center;
    }

    .card {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      margin: 15px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 30px rgba(198,255,0,0.3);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #c6ff00;
    }

    .card p {
      color: #aaa;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      color: #666;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">LAMBO</div>
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">Design</a>
      <a href="#">Specs</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Super <span>Lambo</span></h1>
    <p>Feel the power. Experience the speed.</p>
    <button class="btn">Explore</button>
  </div>

  <!-- DESIGN SECTION -->
  <div class="section">
    <div class="card">
      <h3>Speed</h3>
      <p>0–100 km/h in 2.9s</p>
    </div>

    <div class="card">
      <h3>Engine</h3>
      <p>V10 Power Engine</p>
    </div>

    <div class="card">
      <h3>Top Speed</h3>
      <p>350+ km/h</p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Lambo Design
  </footer>

</body>
</html>
